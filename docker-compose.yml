version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/farmease

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"

  mongodb:
    image: mongo:6
    ports:
      - "27017:27017"